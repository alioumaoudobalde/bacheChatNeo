<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a3f8f">
  <title>Créer un compte — Bacheliers Néo</title>

  <!-- Bootstrap 5 (CSS uniquement, pas de bundle JS lourd) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Styles custom (ordre important : variables -> style -> responsive) -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

  <main class="auth-card">

    <!-- Branding -->
    <div class="auth-icon">
      <i class="bi bi-mortarboard-fill" aria-hidden="true"></i>
    </div>
    <h1 class="auth-brand">Bacheliers Néo</h1>
    <p class="auth-subtitle">
      Rejoignez la communauté étudiante de La Dioulacolon.
    </p>

    <!-- Message d'erreur / info (piloté par auth.js) -->
    <div id="registerAlert" class="auth-alert alert alert-danger" role="alert"></div>

    <form id="registerForm" novalidate>

      <!-- Photo de profil (optionnelle) -->
      <div class="photo-upload">
        <button type="button" class="photo-upload-circle" id="photoUploadBtn" aria-label="Ajouter une photo de profil">
          <img id="photoPreview" src="" alt="" hidden>
          <i class="bi bi-camera-fill" id="photoIcon" aria-hidden="true"></i>
        </button>
        <span class="photo-upload-label">Photo</span>
        <input type="file" id="photo" name="photo" accept="image/*">
      </div>

      <!-- Nom complet -->
      <div class="mb-3">
        <label for="nomComplet" class="form-label">Nom complet</label>
        <input
          type="text"
          class="form-control"
          id="nomComplet"
          name="nomComplet"
          placeholder="Ex: Amadou Diallo"
          autocomplete="name"
          required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="étudiant@exemple.sn"
          autocomplete="email"
          required>
      </div>

      <!-- Mot de passe -->
      <div class="mb-4">
        <label for="password" class="form-label">Mot de passe</label>
        <div class="password-field">
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="8 caractères minimum"
            autocomplete="new-password"
            minlength="8"
            required>
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Afficher le mot de passe" aria-pressed="false">
            <i class="bi bi-eye-slash-fill" id="togglePasswordIcon" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Soumission -->
      <button type="submit" class="btn-auth" id="registerSubmit">
        <span id="registerSubmitLabel">Créer un compte</span>
        <span id="registerSubmitSpinner" class="spinner-border spinner-border-sm ms-2" role="status" aria-hidden="true" hidden></span>
      </button>

    </form>

    <p class="auth-switch">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </p>

    <p class="auth-terms">
      En vous inscrivant, vous acceptez nos
      <a href="conditions.html">Conditions d'utilisation</a>.
    </p>

  </main>

  <!-- Interactions UI locales (aperçu photo, affichage mot de passe) -->
  <script type="module" src="assets/js/pages/register-ui.js"></script>

  <!-- Logique métier (authService.js / firestoreService.js) -->
  <script type="module" src="assets/js/pages/auth.js"></script>
</body>
</html>
