<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FAFAFF" />
    <title>Accueil | Bacheliers Néo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body class="app-body home-body">
    <div class="home-shell">
      <header class="home-header">
        <button class="home-icon-button" type="button" data-back aria-label="Retour">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
        </button>
        <h1 class="home-title">Dioulacolon Student Portal</h1>
      </header>

      <main class="home-main">
        <section class="home-greeting" aria-labelledby="homeGreeting">
          <div class="home-greeting-copy">
            <h2 id="homeGreeting">Salut, <span id="welcomeName">...</span> !</h2>
            <p>Que souhaitez-vous faire aujourd'hui ?</p>
          </div>
          <div class="home-avatar">
            <img id="userPhoto" src="" alt="" hidden />
            <span id="userInitials" aria-hidden="true">BN</span>
          </div>
        </section>

        <section class="home-actions" aria-label="Actions principales">
          <a class="home-action-card" href="https://orientation.campusen.sn" target="_blank" rel="noopener">
            <span class="home-action-icon home-action-icon-primary">
              <i class="bi bi-mortarboard-fill" aria-hidden="true"></i>
            </span>
            <span class="home-action-copy">
              <span class="home-action-title">Plateforme<br />Campusen</span>
              <span class="home-action-text">Accès aux bourses et orientations</span>
            </span>
            <i class="bi bi-box-arrow-up-right home-action-arrow home-action-arrow-primary" aria-hidden="true"></i>
          </a>

          <a class="home-action-card" href="chat.html">
            <span class="home-action-icon home-action-icon-success">
              <i class="bi bi-chat-left-text-fill" aria-hidden="true"></i>
            </span>
            <span class="home-action-copy">
              <span class="home-action-title">Chat d'entraide</span>
              <span class="home-action-text">Échangez avec la communauté</span>
            </span>
            <i class="bi bi-chevron-right home-action-arrow home-action-arrow-success" aria-hidden="true"></i>
          </a>

          <a class="home-action-card" href="faq.html">
            <span class="home-action-icon home-action-icon-muted">
              <i class="bi bi-question-square-fill" aria-hidden="true"></i>
            </span>
            <span class="home-action-copy">
              <span class="home-action-title">Foire Aux Questions</span>
              <span class="home-action-text">Réponses à vos questions Campusen</span>
            </span>
            <i class="bi bi-chevron-right home-action-arrow home-action-arrow-primary" aria-hidden="true"></i>
          </a>
        </section>
      </main>

      <nav class="home-bottom-nav" aria-label="Navigation principale">
        <a class="home-bottom-link is-active" href="dashboard.html" aria-current="page">
          <span class="home-bottom-icon"><i class="bi bi-house-door-fill" aria-hidden="true"></i></span>
          <span>Home</span>
        </a>
        <a class="home-bottom-link" href="chat.html">
          <span class="home-bottom-icon"><i class="bi bi-chat-left-text" aria-hidden="true"></i></span>
          <span>Chat</span>
        </a>
        <a class="home-bottom-link" href="faq.html">
          <span class="home-bottom-icon"><i class="bi bi-question-square" aria-hidden="true"></i></span>
          <span>FAQ</span>
        </a>
        <a class="home-bottom-link" href="profile.html">
          <span class="home-bottom-icon"><i class="bi bi-person" aria-hidden="true"></i></span>
          <span>Profile</span>
        </a>
      </nav>
    </div>

    <script type="module" src="assets/js/pages/dashboard-ui.js"></script>
    <script type="module" src="assets/js/pages/dashboard.js"></script>
  </body>
</html>
